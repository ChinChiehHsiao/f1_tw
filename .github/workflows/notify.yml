name: F1 比賽前通知

on:
  schedule:
    # 每週一 02:00 UTC = 台灣時間 10:00
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      force_notify:
        description: '強制發送通知（測試用）'
        type: boolean
        default: false

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 執行通知腳本
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          FORCE_NOTIFY: ${{ inputs.force_notify }}
        run: python notify.py

name: 自動抓取愛爾達轉播頻道

on:
  schedule:
    # 每週四 16:00 UTC = 台灣週五 00:00（賽前更新）
    - cron: '0 16 * * 4'
    # 每週一 04:00 UTC = 台灣週一 12:00（賽後確認）
    - cron: '0 4 * * 1'
  workflow_dispatch:  # 允許手動觸發

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 執行爬蟲
        run: python scrape_elta.py

      - name: 提交 elta.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add elta.json
          git diff --staged --quiet && echo "無更新" || (git commit -m "自動更新：愛爾達轉播頻道 $(date -u +%Y-%m-%d)" && git push)
